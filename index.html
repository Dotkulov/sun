<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Солнце</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #0f0a1c 0%, #05030a 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 100, 150, 0.12), transparent 60%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 85% 70%, rgba(140, 80, 255, 0.1), transparent 70%);
            pointer-events: none;
        }

        .stars-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, rgba(80, 40, 120, 0.15), rgba(180, 60, 100, 0.08), rgba(60, 80, 180, 0.1));
            pointer-events: none;
            z-index: 0;
            animation: auroraWave 18s ease infinite;
        }

        @keyframes auroraWave {
            0% { opacity: 0.3; transform: scale(1); filter: blur(60px);}
            50% { opacity: 0.7; transform: scale(1.1); filter: blur(80px);}
            100% { opacity: 0.3; transform: scale(1); filter: blur(60px);}
        }

        .container {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 1600px;
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(18, 10, 32, 0.7), rgba(10, 5, 22, 0.85));
            backdrop-filter: blur(28px);
            border-radius: 80px;
            padding: 36px 32px;
            box-shadow: 0 60px 100px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 170, 200, 0.5);
            transition: all 0.4s;
        }

        .two-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
        }

        .gallery-section {
            flex: 1.2;
            min-width: 290px;
            background: radial-gradient(circle at 10% 20%, rgba(30, 18, 55, 0.6), rgba(12, 6, 28, 0.7));
            border-radius: 64px;
            padding: 32px 28px;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 150, 185, 0.5);
            transition: transform 0.3s;
        }

        .gallery-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(255, 120, 160, 0.6);
        }

        .gallery-header h3 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff5fc, #ffbfd5, #ff9ac0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: -0.5px;
        }

        .gallery-header i {
            font-size: 2rem;
            color: #ff7aa8;
            filter: drop-shadow(0 0 6px #ff5a88);
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .photo-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 48px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.3);
            cursor: pointer;
            box-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 170, 200, 0.7);
            transform: translateY(0);
        }
        .photo-card1 {
        
            background: rgba(0, 0, 0, 0.5);
            border-radius: 48px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.3);
            cursor: pointer;
            box-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 170, 200, 0.7);
            transform: translateY(0);
        }
        .photo-card1:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: #ff8aae;
            box-shadow: 0 35px 55px -12px rgba(255, 60, 110, 0.5);
        }

        .photo-card1:active {
            transform: scale(0.97);
        }

        .photo-card1 img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
            transition: transform 0.6s;
        }

        .photo-card1:hover img {
            transform: scale(1.05);
        }

        .photo-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: #ff8aae;
            box-shadow: 0 35px 55px -12px rgba(255, 60, 110, 0.5);
        }

        .photo-card:active {
            transform: scale(0.97);
        }

        .photo-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
            transition: transform 0.6s;
        }

        .photo-card:hover img {
            transform: scale(1.05);
        }

        .photo-label {
            text-align: center;
            padding: 14px 10px;
            font-weight: 600;
            background: linear-gradient(145deg, rgba(0, 0, 0, 0.7), rgba(45, 25, 70, 0.8));
            backdrop-filter: blur(8px);
            color: #ffe6f0;
            font-size: 0.8rem;
            letter-spacing: 0.8px;
        }

        .timer-section {
            flex: 1.5;
            min-width: 310px;
            background: radial-gradient(ellipse at 30% 40%, rgba(50, 28, 85, 0.7), rgba(18, 8, 38, 0.85));
            border-radius: 70px;
            padding: 40px 34px;
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 150, 185, 0.65);
            position: relative;
            overflow: hidden;
        }

        .timer-section::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -20%;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(255, 120, 160, 0.1), transparent 70%);
            pointer-events: none;
        }

        .title-romantic {
            text-align: center;
            font-size: 2.3rem;
            font-weight: 800;
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(145deg, #fff5fc, #ffc0d8, #ff8ab0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .date-badge {
            text-align: center;
            background: linear-gradient(90deg, transparent, rgba(255, 160, 190, 0.4), transparent);
            backdrop-filter: blur(12px);
            width: fit-content;
            margin: 0 auto 32px auto;
            padding: 12px 32px;
            border-radius: 80px;
            color: #ffeef5;
            font-weight: 600;
            font-size: 1rem;
            border: 1px solid rgba(255, 130, 165, 0.8);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
        }

        .timer-display {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 38px;
        }

        .time-unit {
            background: linear-gradient(145deg, rgba(0, 0, 0, 0.7), rgba(35, 20, 65, 0.9));
            border-radius: 60px;
            padding: 20px 16px;
            min-width: 85px;
            text-align: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 140, 175, 0.9);
            transition: all 0.3s;
        }

        .time-unit:hover {
            transform: translateY(-6px);
            border-color: #ff7aa8;
            box-shadow: 0 30px 45px -12px rgba(255, 60, 110, 0.4);
        }

        .time-value {
            font-size: 3.8rem;
            font-weight: 800;
            background: linear-gradient(145deg, #fff5f7, #ffc8de);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 6px;
        }

        .time-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #ffbfd4;
            letter-spacing: 2px;
            margin-top: 12px;
        }

        .message-card {
            text-align: center;
            background: linear-gradient(115deg, rgba(255, 170, 195, 0.25), rgba(190, 130, 220, 0.2));
            backdrop-filter: blur(20px);
            padding: 20px 24px;
            border-radius: 70px;
            font-weight: 600;
            font-size: 1rem;
            color: #fff5fa;
            border: 1px solid rgba(255, 140, 170, 0.7);
            margin-top: 12px;
        }

        .additional-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 28px;
        }

        .action-btn {
            background: linear-gradient(135deg, rgba(255, 190, 210, 0.2), rgba(255, 130, 160, 0.25));
            border: 1px solid rgba(255, 140, 175, 0.7);
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #ffe2ef;
            cursor: pointer;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(12px);
        }

        .action-btn:active {
            transform: scale(0.94);
            background: rgba(255, 120, 160, 0.4);
        }

        .quote-line {
            text-align: center;
            margin-top: 28px;
            font-style: italic;
            font-size: 0.95rem;
            color: #ebcbd9;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .footer-line {
            margin-top: 40px;
            text-align: center;
            font-size: 0.75rem;
            color: #b98faa;
            border-top: 1px solid rgba(255, 150, 180, 0.4);
            padding-top: 30px;
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
        }

        .music-control {
            position: fixed;
            bottom: 28px;
            left: 24px;
            z-index: 100;
            background: rgba(20, 12, 40, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 80px;
            padding: 10px 20px;
            border: 1px solid rgba(255, 160, 190, 0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #ffd0e2;
            transition: all 0.2s;
        }

        .music-control:active {
            transform: scale(0.96);
        }

        .music-control i {
            font-size: 1.2rem;
        }

        .theme-toggle {
            position: fixed;
            bottom: 28px;
            right: 24px;
            z-index: 100;
            background: rgba(20, 12, 40, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 80px;
            padding: 6px;
            border: 1px solid rgba(255, 160, 190, 0.7);
            cursor: pointer;
            transition: all 0.3s;
        }

        .theme-toggle-inner {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 70px;
            padding: 8px 18px;
        }

        .toggle-icon {
            font-size: 1.2rem;
            color: #ffd0e2;
        }

        .toggle-switch {
            width: 50px;
            height: 26px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            position: relative;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.3);
        }

        .toggle-switch::before {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: linear-gradient(145deg, #ffbfd0, #ff8aae);
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.3);
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .theme-toggle.active .toggle-switch::before {
            transform: translateX(24px);
            background: linear-gradient(145deg, #c9b6e0, #a088c0);
        }

        body.light-theme {
            background: radial-gradient(ellipse at 30% 40%, #f9f0ff 0%, #ecddfa 100%);
        }

        body.light-theme .glass-panel {
            background: linear-gradient(135deg, rgba(250, 240, 255, 0.8), rgba(240, 225, 255, 0.9));
            border: 1px solid rgba(180, 140, 220, 0.6);
        }

        body.light-theme .gallery-section,
        body.light-theme .timer-section {
            background: rgba(245, 235, 255, 0.65);
            border-color: rgba(170, 130, 200, 0.6);
        }

        body.light-theme .title-romantic,
        body.light-theme .gallery-header h3 {
            background: linear-gradient(135deg, #a04070, #d46090);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        body.light-theme .date-badge,
        body.light-theme .message-card,
        body.light-theme .quote-line,
        body.light-theme .footer-line,
        body.light-theme .photo-label,
        body.light-theme .time-label,
        body.light-theme .action-btn {
            color: #4a2a60;
        }

        body.light-theme .time-value {
            background: linear-gradient(145deg, #b84a78, #dc6e98);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        body.light-theme .time-unit {
            background: linear-gradient(145deg, rgba(220, 200, 250, 0.9), rgba(200, 175, 240, 0.95));
            border-color: rgba(150, 110, 190, 0.7);
        }

        body.light-theme .music-control,
        body.light-theme .theme-toggle {
            background: rgba(230, 215, 250, 0.9);
            color: #7a4a6e;
            border-color: rgba(160, 120, 180, 0.7);
        }

        /* ========== ДОБАВЛЕННЫЕ СТИЛИ ДЛЯ ФОТОКАРТОЧЕК В СВЕТЛОЙ ТЕМЕ ========== */
        body.light-theme .photo-card {
            background: rgba(220, 200, 250, 0.8);
            border-color: rgba(150, 110, 190, 0.6);
        }

        body.light-theme .photo-label {
            background: linear-gradient(145deg, rgba(210, 185, 240, 0.85), rgba(190, 160, 220, 0.9));
            color: #3a2a4a;
        }

        @media (max-width: 720px) {
            .glass-panel { padding: 24px 20px; border-radius: 56px; }
            .time-value { font-size: 2.6rem; letter-spacing: 2px; }
            .time-unit { min-width: 72px; padding: 14px 10px; }
            .title-romantic { font-size: 1.8rem; }
            .action-btn { padding: 8px 14px; font-size: 0.75rem; }
        }

        @keyframes appearUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-appear { animation: appearUp 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards; }

        .toast-msg {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(24px);
            padding: 14px 28px;
            border-radius: 80px;
            color: #ffeef5;
            font-size: 0.9rem;
            z-index: 200;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            font-weight: 500;
            border: 1px solid rgba(255, 170, 200, 0.6);
        }
    </style>
</head>
<body>
<div class="aurora"></div>
<canvas class="stars-field" id="starsCanvas"></canvas>
<div class="container animate-appear">
    <div class="glass-panel">
        <div class="two-columns">
            <div class="gallery-section">
                <div class="gallery-header">
                    <h3>Твои фотографии</h3>
                    <i class="fas fa-feather-alt"></i>
                </div>
                <div class="photo-grid">
                    <div class="photo-card1"><img src="1.jpg" alt="Портрет"><div class="photo-label">Мое солнце</div></div>
                    <div class="photo-card"><img src="2.jpg" alt="Улыбка"><div class="photo-label">Мое солнце</div></div>
                    <div class="photo-card"><img src="3.jpg" alt="Романтика"><div class="photo-label">Мое солнце</div></div>
                    <div class="photo-card"><img src="4.jpg" alt="Магия"><div class="photo-label">Мое солнце</div></div>
                </div>
                <div style="text-align: center; margin-top: 26px; font-size: 0.75rem; color: #e2c2d4;"></div>
            </div>

            <div class="timer-section">
                <div class="title-romantic">С момента знакомства</div>
                <div class="date-badge"><i class="far fa-calendar-alt"></i> 3 июня 2026 </i></div>
                <div class="timer-display">
                    <div class="time-unit"><div class="time-value" id="days">00</div><div class="time-label">Дней</div></div>
                    <div class="time-unit"><div class="time-value" id="hours">00</div><div class="time-label">Часов</div></div>
                    <div class="time-unit"><div class="time-value" id="minutes">00</div><div class="time-label">Минут</div></div>
                    <div class="time-unit"><div class="time-value" id="seconds">00</div><div class="time-label">Секунд</div></div>
                </div>
                <div class="message-card" id="loveMessage">с того самого мгновения</div>
                
                
                <div class="quote-line" id="dynamicQuote"></div>
            </div>
        </div>
        <div class="footer-line">

        </div>
    </div>
</div>

<div class="music-control" id="musicControl">
    <i class="fas fa-music" id="musicIcon"></i>
    <span id="musicText"> </span>
</div>

<div class="theme-toggle" id="themeToggle">
    <div class="theme-toggle-inner">
        <i class="fas fa-moon toggle-icon"></i>
        <div class="toggle-switch"></div>
        <i class="fas fa-sun toggle-icon"></i>
    </div>
</div>
<div id="toast" class="toast-msg"></div>

<script>
    (function() {
        let audio = null;
        let isMusicPlaying = false;
        let musicAttempted = false;
        
        function initAndPlayMusic() {
            if (musicAttempted) return;
            musicAttempted = true;
            
            audio = new Audio('время.mp3');
            audio.loop = true;
            audio.volume = 0.4;
            audio.preload = 'auto';
            
            audio.addEventListener('canplaythrough', () => {
                console.log('Музыка загружена');
            });
            
            audio.addEventListener('error', (e) => {
                console.warn('Файл "время.mp3" не найден. Музыка не будет играть.');
                document.getElementById('musicText').innerHTML = ' Файл не найден';
                document.getElementById('musicIcon').className = 'fas fa-volume-off';
            });
            
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isMusicPlaying = true;
                    console.log('Музыка играет автоматически');
                    document.getElementById('musicIcon').className = 'fas fa-volume-up';
                }).catch(err => {
                    console.log('Автовоспроизведение заблокировано. Нужно первое взаимодействие.');
                    isMusicPlaying = false;
                    document.getElementById('musicIcon').className = 'fas fa-music';
                    
                    const unlockMusic = () => {
                        if (audio && !isMusicPlaying) {
                            audio.play().then(() => {
                                isMusicPlaying = true;
                                document.getElementById('musicIcon').className = 'fas fa-volume-up';
                                console.log('Музыка запущена после взаимодействия');
                            }).catch(e => console.log('Ошибка запуска:', e));
                        }
                        document.removeEventListener('click', unlockMusic);
                        document.removeEventListener('touchstart', unlockMusic);
                    };
                    document.addEventListener('click', unlockMusic);
                    document.addEventListener('touchstart', unlockMusic);
                });
            }
        }
        
        const musicControl = document.getElementById('musicControl');
        const musicIcon = document.getElementById('musicIcon');
        const musicText = document.getElementById('musicText');
        
        function toggleMusic() {
            if (!audio) {
                initAndPlayMusic();
                setTimeout(() => toggleMusic(), 200);
                return;
            }
            if (isMusicPlaying) {
                audio.pause();
                isMusicPlaying = false;
                musicIcon.className = 'fas fa-pause';
                musicText.innerHTML = '';
                setTimeout(() => {
                    if (!isMusicPlaying) {
                        musicIcon.className = 'fas fa-music';
                        musicText.innerHTML = ' ';
                    }
                }, 2000);
            } else {
                audio.play().then(() => {
                    isMusicPlaying = true;
                    musicIcon.className = 'fas fa-volume-up';
                    musicText.innerHTML = ' ';
                }).catch(e => console.log('Ошибка воспроизведения:', e));
            }
        }
        
        musicControl.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMusic();
        });
        
        setTimeout(() => {
            initAndPlayMusic();
        }, 100);
        
        const START_YEAR = 2026, START_MONTH = 5, START_DAY = 3;
        const START_HOUR = 2, START_MINUTE = 0, START_SECOND = 0;
        
        function getStartDate() { return new Date(START_YEAR, START_MONTH, START_DAY, START_HOUR, START_MINUTE, START_SECOND); }
        let startMoment = getStartDate();
        
        function formatTwoDigits(num) { return num < 10 ? '0' + num : num; }
        
        function declension(num, one, two, five) {
            let n = Math.abs(num) % 100;
            if (n >= 11 && n <= 19) return five;
            n %= 10;
            if (n === 1) return one;
            if (n >= 2 && n <= 4) return two;
            return five;
        }
        
        function getNextMilestone(days) {
            for (let m of milestones) {
                if (m.days > days) return { daysLeft: m.days - days, text: m.text, target: m.days };
            }
            return { daysLeft: null, text: "Вечность уже наступила", target: null };
        }
        
        function updateTimer() {
            const now = new Date();
            let diff = now - startMoment;
            if (diff < 0) diff = 0;
            const totalSec = Math.floor(diff / 1000);
            const days = Math.floor(totalSec / 86400);
            const hours = Math.floor((totalSec % 86400) / 3600);
            const minutes = Math.floor((totalSec % 3600) / 60);
            const seconds = totalSec % 60;
            
            document.getElementById('days').innerHTML = days;
            document.getElementById('hours').innerHTML = formatTwoDigits(hours);
            document.getElementById('minutes').innerHTML = formatTwoDigits(minutes);
            document.getElementById('seconds').innerHTML = formatTwoDigits(seconds);
            
            const totalYears = Math.floor(days / 365.25);
            const totalMonths = Math.floor(days / 30.44);
            let periodText = '';
            if (totalYears > 0) {
                const remainDays = days % 365;
                periodText = `${totalYears} ${declension(totalYears, 'год', 'года', 'лет')} ${remainDays} ${declension(remainDays, 'день', 'дня', 'дней')}`;
            } else if (totalMonths > 0) {
                periodText = `${totalMonths} ${declension(totalMonths, 'месяц', 'месяца', 'месяцев')} (${days} дней)`;
            } else {
                periodText = `${days} ${declension(days, 'день', 'дня', 'дней')} ${hours} ${declension(hours, 'час', 'часа', 'часов')}`;
            }
            document.getElementById('loveMessage').innerHTML = `вместе уже ${periodText}`;
            return days;
        }
        
        let interval = setInterval(() => { updateTimer(); }, 1000);
        updateTimer();
        
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) clearInterval(interval);
            else { clearInterval(interval); interval = setInterval(() => { updateTimer(); }, 1000); updateTimer(); }
        });
        
        function showToast(msg, duration = 2600) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, duration);
        }
        
        const photoCards = document.querySelectorAll('.photo-card');
        photoCards.forEach(card => {
            card.addEventListener('click', (e) => {
                const x = e.clientX, y = e.clientY;
                for (let i = 0; i < 12; i++) {
                    const particle = document.createElement('div');
                    particle.innerHTML = i % 2 === 0 ? '✦' : '❤';
                    particle.style.position = 'fixed';
                    particle.style.left = x + (Math.random() - 0.5) * 70 + 'px';
                    particle.style.top = y + (Math.random() - 0.5) * 60 + 'px';
                    particle.style.fontSize = (Math.random() * 18 + 12) + 'px';
                    particle.style.color = ['#ff90b0', '#ff7aa8', '#ffb0c8'][Math.floor(Math.random()*3)];
                    particle.style.pointerEvents = 'none';
                    particle.style.zIndex = '10000';
                    particle.style.opacity = '0.9';
                    particle.style.transition = 'all 1.1s cubic-bezier(0.2, 0.9, 0.4, 1.2)';
                    document.body.appendChild(particle);
                    setTimeout(() => {
                        particle.style.transform = `translateY(${-80 - Math.random() * 80}px) translateX(${(Math.random() - 0.5) * 110}px) rotate(${Math.random() * 120}deg)`;
                        particle.style.opacity = '0';
                        setTimeout(() => particle.remove(), 1200);
                    }, 10);
                }
                showToast('Мое солнце');
            });
        });
        
        function initStars() {
            const canvas = document.getElementById('starsCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const stars = [];
            for (let i = 0; i < 220; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2.2 + 0.6,
                    alpha: Math.random() * 0.6 + 0.2,
                    speed: 0.002 + Math.random() * 0.01,
                    phase: Math.random() * Math.PI * 2
                });
            }
            function animateStars() {
                if (!ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const time = Date.now() * 0.002;
                for (let star of stars) {
                    const brightness = 0.4 + 0.6 * Math.sin(time * star.speed + star.phase);
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 220, 240, ${star.alpha * brightness})`;
                    ctx.fill();
                }
                requestAnimationFrame(animateStars);
            }
            animateStars();
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                stars.length = 0;
                for (let i = 0; i < 220; i++) stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: Math.random() * 2.2 + 0.6, alpha: Math.random() * 0.6 + 0.2, speed: 0.002 + Math.random() * 0.01, phase: Math.random() * Math.PI * 2 });
            });
        }
        initStars();
        
        function checkFuture() {
            if (new Date() < getStartDate()) {
                document.getElementById('days').innerHTML = '0';
                document.getElementById('hours').innerHTML = '00';
                document.getElementById('minutes').innerHTML = '00';
                document.getElementById('seconds').innerHTML = '00';
                document.getElementById('loveMessage').innerHTML = 'скоро этот волшебный миг настанет';
                return true;
            }
            return false;
        }
        
        const originalUpdate = updateTimer;
        clearInterval(interval);
        interval = setInterval(() => {
            if (new Date() < getStartDate()) checkFuture();
            else { originalUpdate(); }
        }, 1000);
        if (new Date() < getStartDate()) checkFuture(); else originalUpdate();
        
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            document.body.classList.toggle('light-theme');
            themeToggle.classList.toggle('active');
            localStorage.setItem('loveTheme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        });
        
        if (localStorage.getItem('loveTheme') === 'light') {
            document.body.classList.add('light-theme');
            themeToggle.classList.add('active');
        }
    })();
</script>
</body>
